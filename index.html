<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="robots" content="noindex" />
    <meta name="color-scheme" content="light" />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <title>A Mad Tea Party</title>
    <script type="module" crossorigin src="./assets/index-DV46lu2Q.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BPAXqmsi.css">
  </head>
  <body>
    <div id="shell" class="shell">
      <header class="shell-top">
        <span class="brand" aria-hidden="true">LOOKING GLASS GIRL</span>
      </header>
      <div class="screen-bezel">
        <div class="power-led" aria-hidden="true"></div>
        <div id="screen-box" class="screen-box"></div>
      </div>
      <div id="controls" class="controls">
        <div id="dpad" class="dpad" role="group" aria-label="Direction pad">
          <div class="dpad-arm dpad-up" data-dir="up" aria-hidden="true"></div>
          <div class="dpad-arm dpad-down" data-dir="down" aria-hidden="true"></div>
          <div class="dpad-arm dpad-left" data-dir="left" aria-hidden="true"></div>
          <div class="dpad-arm dpad-right" data-dir="right" aria-hidden="true"></div>
          <div class="dpad-hub" aria-hidden="true"></div>
        </div>
        <div class="face-buttons">
          <button id="btn-b" class="btn-round btn-b" type="button" tabindex="-1" aria-label="B button">B</button>
          <button id="btn-a" class="btn-round btn-a" type="button" tabindex="-1" aria-label="A button">A</button>
        </div>
        <div class="meta-buttons">
          <button id="btn-select" class="btn-pill" type="button" tabindex="-1" aria-label="Select">SELECT</button>
          <span class="flourish" aria-hidden="true">❦</span>
          <button id="btn-start" class="btn-pill" type="button" tabindex="-1" aria-label="Start">START</button>
        </div>
      </div>
    </div>
    <div id="overlay-root"></div>
    <noscript>
      <p class="noscript">
        This invitation is a tiny video game, and it needs JavaScript to pour the tea. Your
        invitation details are also available from your host.
      </p>
    </noscript>
  </body>
</html>
